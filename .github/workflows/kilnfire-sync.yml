name: Kilnfire daily sync

on:
  schedule:
    # 14:00 UTC = 10:00 ET in standard time, 10:00 EDT in daylight time.
    # Picks up classes that ended yesterday or earlier.
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Look back N days (default 14)'
        required: false
        default: '14'
      dry_run:
        description: 'Dry run — log only, no writes'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/kilnfire/requirements.txt

      - name: Run sync
        env:
          KILNFIRE_URL:    ${{ secrets.KILNFIRE_URL }}
          KILNFIRE_USER:   ${{ secrets.KILNFIRE_USER }}
          KILNFIRE_PASS:   ${{ secrets.KILNFIRE_PASS }}
          BASE_URL:        ${{ secrets.BASE_URL }}
          STUDIO_PASSWORD: ${{ secrets.STUDIO_PASSWORD }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.since }}" != "" ]; then
            ARGS="--since ${{ github.event.inputs.since }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/sync-kilnfire.py $ARGS
